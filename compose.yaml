services:
  agentos-db:
    image: agnohq/pgvector:18
    container_name: agentos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    networks:
      - agentos

  agentos-api:
    container_name: agentos-api
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-agno-agentos}:${IMAGE_TAG:-latest}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - agentos-data:/data
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      RUNTIME_ENV: dev
      AGNO_DEBUG: "True"
      DB_HOST: agentos-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
      WAIT_FOR_DB: "True"
      PRINT_ENV_ON_LOAD: "True"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EXA_API_KEY: ${EXA_API_KEY:-}
      MCP_URL: http://ibmi-mcp-server:3010/mcp
    depends_on:
      agentos-db:
        condition: service_started
      ibmi-mcp-server:
        condition: service_healthy
    networks:
      - agentos
  ibmi-mcp-server:
    image: ghcr.io/ibm/ibmi-mcp-server:latest
    container_name: ibmi-mcp-server
    restart: unless-stopped
    ports:
      - "3010:3010"
    networks:
      - agentos
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT_TYPE=http
      - MCP_SESSION_MODE=stateless
      - YAML_AUTO_RELOAD=true
      - TOOLS_YAML_PATH=/usr/src/app/tools
      - YAML_ALLOW_DUPLICATE_SOURCES=true
      - IBMI_ENABLE_EXECUTE_SQL=true
      - MCP_RATE_LIMIT_ENABLED=true
      - MCP_RATE_LIMIT_MAX_REQUESTS=5000
      - MCP_RATE_LIMIT_WINDOW_MS=60000
      - MCP_RATE_LIMIT_SKIP_DEV=true
    volumes:
      - ./tools:/usr/src/app/tools:rw
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3010/healthz').then(function(r){process.exit(r.ok?0:1)}).catch(function(){process.exit(1)})\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s


networks:
  agentos:

volumes:
  pgdata:
  agentos-data:
